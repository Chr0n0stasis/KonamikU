name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "platform-tools" \
            "ndk;29.0.14206865" \
            "cmake;3.22.1"

      - name: Fetch Dobby
        run: |
          rm -rf app/src/main/jni/Dobby
          git clone --depth 1 https://github.com/jmpews/Dobby.git app/src/main/jni/Dobby

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug -PandroidCompileSdk=36 -PandroidTargetSdk=36 --stacktrace --no-daemon
